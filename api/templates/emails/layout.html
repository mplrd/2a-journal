<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{title}}</title>
</head>
<body style="margin:0;padding:0;background-color:#e8e8e6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1f2a3c;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#e8e8e6;">
        <tr>
            <td align="center" style="padding:32px 16px;">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;background-color:#ffffff;border-radius:8px;overflow:hidden;border:1px solid #d8d8d4;">
                    <tr>
                        <td align="center" style="padding:32px 24px 8px 24px;">
                            <img src="{{frontend_url}}/email-logo.png" alt="{{app_name}}" width="120" height="120" style="display:block;width:120px;height:auto;border:0;outline:none;text-decoration:none;">
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 32px 8px 32px;">
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr><td style="height:3px;background-color:#2d7952;line-height:3px;font-size:0;">&nbsp;</td></tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:24px 32px 8px 32px;">
                            <h1 style="margin:0;font-size:22px;line-height:1.3;font-weight:600;color:#1f2a3c;">{{title}}</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:8px 32px 32px 32px;font-size:15px;line-height:1.6;color:#3a3d44;">
                            {{content}}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:16px 32px;background-color:#f7f7f5;border-top:1px solid #d8d8d4;">
                            <p style="margin:0;font-size:12px;line-height:1.5;color:#6b6e75;text-align:center;">
                                {{app_name}}
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
