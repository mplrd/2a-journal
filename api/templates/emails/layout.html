<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{title}}</title>
</head>
<body style="margin:0;padding:0;background-color:#e8e8e6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1f2a3c;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#e8e8e6;">
        <tr>
            <td align="center" style="padding:32px 16px;">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">
                    <tr>
                        <td align="center" style="padding:36px 32px 28px 32px;background-color:#1f2a3c;border-radius:8px 8px 0 0;">
                            <img src="{{frontend_url}}/email-logo-dark.png" alt="{{app_name}}" width="96" height="96" style="display:block;width:96px;height:auto;margin:0 auto 16px auto;border:0;outline:none;text-decoration:none;">
                            <h1 style="margin:0;font-size:22px;line-height:1.3;font-weight:600;color:#ffffff;">{{title}}</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="height:4px;background-color:#2d7952;line-height:4px;font-size:0;">&nbsp;</td>
                    </tr>
                    <tr>
                        <td style="padding:32px;background-color:#ffffff;font-size:15px;line-height:1.6;color:#3a3d44;border-left:1px solid #d8d8d4;border-right:1px solid #d8d8d4;border-bottom:1px solid #d8d8d4;border-radius:0 0 8px 8px;">
                            {{content}}
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding:20px 32px 0 32px;">
                            <p style="margin:0;font-size:12px;line-height:1.5;color:#6b6e75;">{{app_name}}</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
